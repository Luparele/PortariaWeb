{% extends 'base.html' %}

{% block title %}Check-up & Manutenção - Senha Alterada{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-in zoom-in-95 duration-700">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200 border border-slate-100 overflow-hidden text-center">
        <!-- Header -->
        <div class="bg-indigo-600 p-12 relative overflow-hidden">
            <div class="absolute inset-0 bg-slate-900 opacity-20"></div>
            <div class="relative z-10 flex flex-col items-center">
                <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center mb-6 border border-white/30 animate-bounce">
                    <i data-lucide="check" class="text-white w-12 h-12"></i>
                </div>
                <h2 class="text-3xl font-black text-white italic tracking-tighter uppercase">Sucesso!</h2>
            </div>
        </div>

        <div class="p-10 space-y-6">
            <div>
                <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter mb-2">Sua senha foi alterada</h3>
                <p class="text-sm font-bold text-slate-400">Excelente! Seus dados de acesso foram atualizados e sua conta está protegida.</p>
            </div>

            <div class="pt-6 border-t border-slate-100">
                <a href="{% url 'home' %}" class="block w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-slate-200 transition-all active:scale-95 flex items-center justify-center gap-3">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    Voltar ao Início
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
