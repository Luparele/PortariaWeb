<div class="flex flex-col sm:flex-row sm:items-center justify-between py-3 border-b border-slate-100 last:border-0 hover:bg-slate-50/50 transition-colors px-2 rounded-lg">
    <span class="text-sm font-medium text-slate-700 mb-2 sm:mb-0 pr-4">{{ label }}</span>
    <div class="flex bg-slate-100 rounded-lg p-1 w-fit border border-slate-200 shadow-inner">
        <input type="hidden" name="{{ name }}" id="hidden_{{ name }}" value="NA">
        <button type="button" onclick="setRadio('{{ name }}', 'SIM', this)" class="radio-btn {{ name }}-btn px-4 py-1.5 rounded-md text-xs font-black transition-all text-slate-400 hover:text-slate-600">C</button>
        <button type="button" onclick="setRadio('{{ name }}', 'NAO', this)" class="radio-btn {{ name }}-btn px-4 py-1.5 rounded-md text-xs font-black transition-all text-slate-400 hover:text-slate-600">NC</button>
        <button type="button" onclick="setRadio('{{ name }}', 'NA', this)" class="radio-btn {{ name }}-btn px-4 py-1.5 rounded-md text-xs font-black transition-all active-na">NA</button>
    </div>
</div>
