<div class="flex items-center justify-between py-2 border-b border-slate-50 last:border-0 print:py-1 print:border-slate-200">
    <span class="text-sm text-slate-600 font-medium print:text-[11px]">{{ label }}</span>
    
    {% if value == 'SIM' %}
    <span class="text-[10px] font-bold px-2 py-0.5 rounded border bg-green-100 text-green-700 border-green-200">C</span>
    {% elif value == 'NAO' %}
    <span class="text-[10px] font-bold px-2 py-0.5 rounded border bg-red-100 text-red-700 border-red-200">NC</span>
    {% else %}
    <span class="text-[10px] font-bold px-2 py-0.5 rounded border bg-slate-100 text-slate-500 border-slate-200">NA</span>
    {% endif %}
</div>
